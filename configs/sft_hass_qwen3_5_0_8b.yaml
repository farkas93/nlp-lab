data:
  dataset_manifest_uri: s3://sft-datasets/dataset_id=hass_tools_v2/dataset_version=v1.0.0/manifest.json
  train_split: train
  eval_split: eval
  max_train_samples:
  max_eval_samples:
  cache_mode: refresh

model:
  model_name: Qwen/Qwen3.5-0.8B
  max_seq_len: 4092
  use_bf16: true
  load_in_4bit: true
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

training:
  backend: trl
  experiment_name: qwen3_5_0_8b_hass_sft
  run_name: hass_sft_v1.0.0
  output_dir: ./outputs/qwen3_5_0_8b/hass_sft_v1.0.0
  num_train_epochs: 5
  learning_rate: 2.0e-5
  train_batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 8
  logging_steps: 20
  save_strategy: epoch
  eval_strategy: epoch
  warmup_steps: 30
  lr_scheduler_type: linear
  seed: 42
  gradient_checkpointing: true

hub:
  push_to_hub: true
  repo_name: zskalo/qwen3.5-0.8b-lora-hass-tools
  adapter_tag: v1.0.0
  full_model: false
  full_model_repo_name:
  full_model_tag:


tracking:
  mlflow_tracking_uri: https://mlflow.chezombor.com/

hf_model_cache_dir: ./hf_models
