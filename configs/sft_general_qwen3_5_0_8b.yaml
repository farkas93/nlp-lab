data:
  dataset_manifest_uri: s3://sft-datasets/dataset_id=general/dataset_version=v1/manifest.json
  train_split: train
  eval_split: eval
  max_train_samples:
  max_eval_samples:

model:
  model_name: Qwen/Qwen3.5-0.8B
  max_seq_len: 2048
  use_bf16: true
  load_in_4bit: false

training:
  experiment_name: qwen3_5_0_8b_general_sft
  run_name: general_sft_v1
  output_dir: ./outputs/qwen3_5_0_8b/general_sft_v1
  num_train_epochs: 1
  learning_rate: 2.0e-5
  train_batch_size: 2
  eval_batch_size: 2
  gradient_accumulation_steps: 1
  logging_steps: 20
  save_strategy: epoch
  eval_strategy: epoch
  warmup_steps: 30
  lr_scheduler_type: linear
  seed: 42

hub:
  push_to_hub: false
  repo_name:

tracking:
  mlflow_tracking_uri: http://127.0.0.1:55000

hf_model_cache_dir: ./hf_models
