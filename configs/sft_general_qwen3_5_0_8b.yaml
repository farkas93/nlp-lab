data:
  dataset_manifest_uri: s3://sft-datasets/dataset_id=general/dataset_version=v1/manifest.json
  train_split: train
  eval_split: eval
  cache_mode: reuse
  max_train_samples:
  max_eval_samples:
  expected_manifest_sha256:

model:
  model_name: Qwen/Qwen3.5-0.8B
  max_seq_len: 2048
  use_bf16: true
  load_in_4bit: true
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

training:
  backend: trl
  experiment_name: qwen3_5_0_8b_general_sft
  run_name: general_sft_v1
  output_dir: ./outputs/qwen3_5_0_8b/general_sft_v1
  num_train_epochs: 5
  learning_rate: 2.0e-5
  train_batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 8
  logging_steps: 20
  save_strategy: epoch
  eval_strategy: epoch
  warmup_steps: 30
  lr_scheduler_type: linear
  seed: 42
  gradient_checkpointing: true

hub:
  push_to_hub: false
  repo_name:
  full_model: false
  full_model_repo_name:
  adapter_tag:
  full_model_tag:

tracking:
  mlflow_tracking_uri: https://mlflow.chezombor.com/

hf_model_cache_dir: ./hf_models
